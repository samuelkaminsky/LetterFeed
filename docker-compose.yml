services:
  backend:
    image: ghcr.io/samuelkaminsky/letterfeed-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - letterfeed_data:/data
    networks:
      - letterfeed_network
    deploy:
      resources:
        limits:
          memory: 350M

  frontend:
    image: ghcr.io/samuelkaminsky/letterfeed-frontend:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - letterfeed_network
    deploy:
      resources:
        limits:
          memory: 200M

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
    command: --interval 300 --cleanup
    networks:
      - letterfeed_network
    deploy:
      resources:
        limits:
          memory: 30M

volumes:
  letterfeed_data:

networks:
  letterfeed_network:
    driver: bridge
